<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Mapa orientativo: zonas más caras para vivir en Suiza</title>
  <desc id="desc">Diagrama orientativo (no oficial) que destaca áreas típicamente más caras: Arc lémanique, Zúrich/Zug y Basilea. El resto se marca como medio o más asequible.</desc>

  <defs>
    <style>
      .bg { fill: #ffffff; }
      .border { fill: none; stroke: #e5e7eb; stroke-width: 2; }
      .label { font: 600 18px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #111827; }
      .small { font: 500 14px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #374151; }
      .note { font: 400 13px system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: #6b7280; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="900" height="520"/>

  <text class="label" x="36" y="54">Zonas más caras (orientativo)</text>
  <text class="note" x="36" y="78">No es un mapa oficial ni exacto: sirve como referencia rápida para entender patrones de coste.</text>

  <!-- Simplified “Switzerland” silhouette -->
  <path class="border" d="M210 150
    C260 115, 345 115, 395 145
    C430 115, 520 120, 560 155
    C630 140, 700 165, 715 210
    C770 245, 770 310, 710 340
    C690 395, 615 415, 560 400
    C520 440, 440 455, 395 430
    C350 455, 275 450, 245 410
    C190 395, 150 350, 160 300
    C120 265, 140 190, 210 150 Z"/>

  <!-- Regions (schematic blocks placed over silhouette) -->
  <!-- More expensive -->
  <path d="M235 305 C250 275, 275 255, 305 250 C325 285, 315 320, 290 350 C265 350, 245 335, 235 305 Z" fill="#ef4444" opacity="0.9"/>
  <text class="small" x="228" y="372">Arc lémanique</text>
  <text class="note" x="228" y="392">(GE / VD)</text>

  <path d="M505 235 C530 215, 565 215, 590 235 C600 265, 585 300, 555 315 C525 300, 505 270, 505 235 Z" fill="#ef4444" opacity="0.9"/>
  <text class="small" x="510" y="332">Zúrich / Zug</text>

  <!-- Basel (often expensive, but smaller market) -->
  <path d="M565 175 C580 160, 605 160, 620 175 C625 195, 615 215, 592 220 C575 210, 565 195, 565 175 Z" fill="#f59e0b" opacity="0.95"/>
  <text class="note" x="625" y="206">Basilea</text>

  <!-- Medium / more affordable -->
  <path d="M300 205 C340 175, 420 170, 470 195 C475 240, 450 270, 400 285 C355 270, 320 245, 300 205 Z" fill="#60a5fa" opacity="0.75"/>
  <text class="note" x="328" y="200">Centro</text>

  <path d="M335 330 C390 300, 460 300, 515 330 C500 380, 450 405, 395 395 C360 385, 340 365, 335 330 Z" fill="#34d399" opacity="0.65"/>
  <text class="note" x="350" y="420">Resto (variable)</text>

  <!-- Legend -->
  <g transform="translate(36, 440)">
    <rect x="0" y="0" width="828" height="56" rx="12" fill="#f9fafb" stroke="#e5e7eb"/>
    <g transform="translate(18, 18)">
      <rect x="0" y="0" width="18" height="18" rx="4" fill="#ef4444"/>
      <text class="small" x="26" y="14">Más caro (típico)</text>

      <rect x="210" y="0" width="18" height="18" rx="4" fill="#f59e0b"/>
      <text class="small" x="236" y="14">Caro (según zona)</text>

      <rect x="420" y="0" width="18" height="18" rx="4" fill="#60a5fa" opacity="0.9"/>
      <text class="small" x="446" y="14">Medio</text>

      <rect x="560" y="0" width="18" height="18" rx="4" fill="#34d399" opacity="0.9"/>
      <text class="small" x="586" y="14">Más asequible (a menudo)</text>
    </g>
  </g>
</svg>
