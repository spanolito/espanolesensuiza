<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Ilustración: precios y costo de vida en Suiza">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f8fb"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d52b1e"/>
      <stop offset="1" stop-color="#b71e14"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0b1220" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <path d="M0 520C210 420 420 520 640 470C860 420 980 330 1200 380V675H0Z" fill="#e6edf6"/>
  <path d="M0 560C240 470 450 560 660 520C900 470 1000 390 1200 430V675H0Z" fill="#dde6f2"/>

  <!-- Shopping basket -->
  <g transform="translate(160 210)" filter="url(#shadow)">
    <rect x="0" y="0" width="560" height="360" rx="34" fill="#ffffff" stroke="#cfd8e6" stroke-width="4"/>
    <path d="M120 120l-54-82" stroke="#cfd8e6" stroke-width="10" stroke-linecap="round"/>
    <path d="M440 120l54-82" stroke="#cfd8e6" stroke-width="10" stroke-linecap="round"/>
    <path d="M82 120h396" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>
    <path d="M140 160h280l-34 180H174z" fill="#f7f8fb" stroke="#cfd8e6" stroke-width="4" stroke-linejoin="round"/>
    <path d="M220 202v96" stroke="#cfd8e6" stroke-width="10" stroke-linecap="round"/>
    <path d="M300 202v96" stroke="#cfd8e6" stroke-width="10" stroke-linecap="round"/>
    <circle cx="220" cy="380" r="22" fill="#d52b1e"/>
    <circle cx="360" cy="380" r="22" fill="#d52b1e" opacity="0.85"/>
  </g>

  <!-- Price tag -->
  <g transform="translate(760 170)" filter="url(#shadow)">
    <path d="M40 0h260c22 0 40 18 40 40v210c0 14-6 28-16 38l-106 106c-16 16-42 16-58 0L18 292c-10-10-16-24-16-38V40C2 18 18 0 40 0Z"
          fill="#ffffff" stroke="#cfd8e6" stroke-width="4"/>
    <circle cx="250" cy="84" r="24" fill="#f7f8fb" stroke="#cfd8e6" stroke-width="4"/>
    <path d="M74 146H254" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>
    <path d="M74 196H214" stroke="#cfd8e6" stroke-width="12" stroke-linecap="round"/>
    <path d="M74 246H238" stroke="#cfd8e6" stroke-width="12" stroke-linecap="round"/>
  </g>

  <!-- Up arrow (pressure) -->
  <g transform="translate(860 512)" filter="url(#shadow)">
    <circle cx="120" cy="120" r="120" fill="#ffffff" stroke="#cfd8e6" stroke-width="4"/>
    <path d="M120 66l56 64h-36v64H100v-64H64z" fill="url(#accent)"/>
  </g>
</svg>

