<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Ilustración: democracia directa y votaciones en Suiza">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f8fb"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d52b1e"/>
      <stop offset="1" stop-color="#b71e14"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0b1220" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <path d="M0 520C210 420 420 520 640 470C860 420 980 330 1200 380V675H0Z" fill="#e6edf6"/>
  <path d="M0 560C240 470 430 560 620 520C860 470 980 380 1200 430V675H0Z" fill="#dde6f2"/>

  <!-- Ballot paper -->
  <g transform="translate(220 130)" filter="url(#shadow)">
    <rect x="0" y="0" width="420" height="520" rx="26" fill="#ffffff" stroke="#cfd8e6" stroke-width="4"/>
    <rect x="0" y="0" width="420" height="72" rx="26" fill="#f3f5f9"/>
    <path d="M64 128H356" stroke="#cfd8e6" stroke-width="8" stroke-linecap="round"/>
    <path d="M64 176H304" stroke="#cfd8e6" stroke-width="8" stroke-linecap="round"/>
    <path d="M64 224H332" stroke="#cfd8e6" stroke-width="8" stroke-linecap="round"/>
    <path d="M64 272H260" stroke="#cfd8e6" stroke-width="8" stroke-linecap="round"/>

    <!-- Check -->
    <path d="M96 360l46 48 92-110" fill="none" stroke="url(#accent)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="318" cy="386" r="62" fill="#f7f8fb" stroke="#cfd8e6" stroke-width="4"/>
    <rect x="306" y="338" width="24" height="96" rx="6" fill="#d52b1e"/>
    <rect x="270" y="374" width="96" height="24" rx="6" fill="#d52b1e"/>
  </g>

  <!-- Ballot box -->
  <g transform="translate(690 250)" filter="url(#shadow)">
    <rect x="0" y="0" width="360" height="300" rx="26" fill="#ffffff" stroke="#cfd8e6" stroke-width="4"/>
    <rect x="24" y="36" width="312" height="42" rx="16" fill="#f3f5f9" stroke="#cfd8e6" stroke-width="3"/>
    <rect x="156" y="18" width="48" height="78" rx="12" fill="url(#accent)"/>
    <path d="M88 170H272" stroke="#cfd8e6" stroke-width="10" stroke-linecap="round"/>
    <path d="M88 214H240" stroke="#cfd8e6" stroke-width="10" stroke-linecap="round"/>
    <path d="M88 258H260" stroke="#cfd8e6" stroke-width="10" stroke-linecap="round"/>
  </g>
</svg>

