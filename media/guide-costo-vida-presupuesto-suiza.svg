<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Ilustración: presupuesto y gastos para el costo de vida en Suiza">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f8fb"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d52b1e"/>
      <stop offset="1" stop-color="#b71e14"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0b1220" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <path d="M0 520C210 420 420 520 640 470C860 420 980 330 1200 380V675H0Z" fill="#e6edf6"/>
  <path d="M0 560C240 470 450 560 660 520C900 470 1000 390 1200 430V675H0Z" fill="#dde6f2"/>

  <!-- Wallet -->
  <g transform="translate(150 230)" filter="url(#shadow)">
    <rect x="0" y="0" width="520" height="320" rx="34" fill="#ffffff" stroke="#cfd8e6" stroke-width="4"/>
    <rect x="0" y="0" width="520" height="84" rx="34" fill="#f3f5f9"/>
    <path d="M70 42H450" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>
    <rect x="340" y="156" width="140" height="104" rx="24" fill="#f7f8fb" stroke="#cfd8e6" stroke-width="3"/>
    <circle cx="398" cy="208" r="10" fill="#d52b1e"/>
    <circle cx="430" cy="208" r="10" fill="#d52b1e" opacity="0.85"/>
  </g>

  <!-- Calculator -->
  <g transform="translate(710 160)" filter="url(#shadow)">
    <rect x="0" y="0" width="340" height="430" rx="34" fill="#ffffff" stroke="#cfd8e6" stroke-width="4"/>
    <rect x="38" y="42" width="264" height="70" rx="18" fill="#f3f5f9" stroke="#cfd8e6" stroke-width="3"/>
    <g transform="translate(44 150)" fill="#f7f8fb" stroke="#cfd8e6" stroke-width="3">
      <rect x="0" y="0" width="72" height="72" rx="18"/>
      <rect x="92" y="0" width="72" height="72" rx="18"/>
      <rect x="184" y="0" width="72" height="72" rx="18"/>
      <rect x="0" y="92" width="72" height="72" rx="18"/>
      <rect x="92" y="92" width="72" height="72" rx="18"/>
      <rect x="184" y="92" width="72" height="72" rx="18"/>
      <rect x="0" y="184" width="72" height="72" rx="18"/>
      <rect x="92" y="184" width="72" height="72" rx="18"/>
      <rect x="184" y="184" width="72" height="72" rx="18"/>
    </g>
    <path d="M86 526h168" stroke="url(#accent)" stroke-width="14" stroke-linecap="round"/>
  </g>

  <!-- Coins -->
  <g transform="translate(520 140)" filter="url(#shadow)">
    <circle cx="110" cy="120" r="72" fill="#ffffff" stroke="#cfd8e6" stroke-width="4"/>
    <circle cx="110" cy="120" r="54" fill="url(#accent)" opacity="0.95"/>
    <rect x="98" y="72" width="24" height="96" rx="6" fill="#ffffff"/>
    <rect x="72" y="108" width="76" height="24" rx="6" fill="#ffffff"/>
  </g>
</svg>

