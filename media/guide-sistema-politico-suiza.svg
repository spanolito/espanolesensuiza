<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Ilustración: instituciones y sistema federal suizo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f8fb"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d52b1e"/>
      <stop offset="1" stop-color="#b71e14"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0b1220" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <path d="M0 520C180 440 360 500 540 455C720 410 900 290 1200 340V675H0Z" fill="#e7edf6"/>
  <path d="M0 560C230 480 420 560 600 520C820 470 980 360 1200 415V675H0Z" fill="#dde6f2"/>

  <!-- Swiss flag -->
  <g transform="translate(900 96)" filter="url(#shadow)">
    <rect x="0" y="0" width="220" height="150" rx="14" fill="url(#accent)"/>
    <rect x="96" y="34" width="28" height="82" rx="4" fill="#ffffff"/>
    <rect x="69" y="61" width="82" height="28" rx="4" fill="#ffffff"/>
  </g>

  <!-- Federal building -->
  <g transform="translate(240 170)" filter="url(#shadow)">
    <rect x="0" y="0" width="720" height="340" rx="24" fill="#ffffff" stroke="#cfd8e6" stroke-width="4"/>
    <rect x="0" y="0" width="720" height="56" rx="24" fill="#f3f5f9"/>
    <path d="M60 88H660" stroke="#d52b1e" stroke-width="8" stroke-linecap="round"/>

    <!-- Dome -->
    <path d="M330 150c0-56 27-88 60-88s60 32 60 88" fill="#f3f5f9" stroke="#cfd8e6" stroke-width="4"/>
    <circle cx="390" cy="60" r="10" fill="#d52b1e"/>

    <!-- Columns -->
    <g fill="#f7f8fb" stroke="#cfd8e6" stroke-width="3">
      <rect x="108" y="182" width="52" height="138" rx="10"/>
      <rect x="196" y="182" width="52" height="138" rx="10"/>
      <rect x="284" y="182" width="52" height="138" rx="10"/>
      <rect x="372" y="182" width="52" height="138" rx="10"/>
      <rect x="460" y="182" width="52" height="138" rx="10"/>
      <rect x="548" y="182" width="52" height="138" rx="10"/>
    </g>

    <!-- Steps -->
    <rect x="72" y="320" width="576" height="22" rx="10" fill="#f3f5f9" stroke="#cfd8e6" stroke-width="3"/>
    <rect x="112" y="344" width="496" height="22" rx="10" fill="#f3f5f9" stroke="#cfd8e6" stroke-width="3"/>
  </g>

  <!-- Cantonal blocks -->
  <g transform="translate(78 120)" opacity="0.95">
    <g fill="#ffffff" stroke="#cfd8e6" stroke-width="3">
      <rect x="0" y="0" width="84" height="84" rx="18"/>
      <rect x="0" y="104" width="84" height="84" rx="18"/>
      <rect x="0" y="208" width="84" height="84" rx="18"/>
    </g>
    <g fill="#d52b1e" opacity="0.9">
      <circle cx="42" cy="42" r="10"/>
      <circle cx="42" cy="146" r="10"/>
      <circle cx="42" cy="250" r="10"/>
    </g>
  </g>
</svg>

