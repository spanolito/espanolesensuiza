<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Ilustración: normas de convivencia, ruido y residuos en Suiza">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f8fb"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d52b1e"/>
      <stop offset="1" stop-color="#b71e14"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0b1220" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <path d="M0 520C200 430 380 520 580 470C780 420 980 330 1200 385V675H0Z" fill="#e6edf6"/>
  <path d="M0 565C220 490 420 560 620 530C860 490 1010 390 1200 445V675H0Z" fill="#dde6f2"/>

  <!-- House -->
  <g transform="translate(180 170)" filter="url(#shadow)">
    <path d="M260 0L0 190v10h520v-10z" fill="#ffffff" stroke="#cfd8e6" stroke-width="4" stroke-linejoin="round"/>
    <rect x="60" y="200" width="400" height="310" rx="28" fill="#ffffff" stroke="#cfd8e6" stroke-width="4"/>
    <rect x="220" y="298" width="80" height="212" rx="18" fill="#f3f5f9" stroke="#cfd8e6" stroke-width="3"/>
    <rect x="120" y="270" width="70" height="70" rx="16" fill="#f7f8fb" stroke="#cfd8e6" stroke-width="3"/>
    <rect x="330" y="270" width="70" height="70" rx="16" fill="#f7f8fb" stroke="#cfd8e6" stroke-width="3"/>
    <rect x="60" y="200" width="400" height="54" rx="28" fill="#f3f5f9"/>
    <path d="M90 226H430" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Noise waves -->
  <g transform="translate(810 210)" stroke="#d52b1e" stroke-width="10" fill="none" stroke-linecap="round">
    <path d="M0 110c38-38 38-182 0-220"/>
    <path d="M48 70c24-24 24-116 0-140" opacity="0.8"/>
    <path d="M94 44c16-16 16-72 0-88" opacity="0.65"/>
  </g>

  <!-- Trash / recycling -->
  <g transform="translate(740 360)" filter="url(#shadow)">
    <rect x="0" y="0" width="360" height="220" rx="26" fill="#ffffff" stroke="#cfd8e6" stroke-width="4"/>
    <rect x="0" y="0" width="360" height="58" rx="26" fill="#f3f5f9"/>
    <path d="M54 110h252" stroke="#cfd8e6" stroke-width="10" stroke-linecap="round"/>
    <path d="M54 150h220" stroke="#cfd8e6" stroke-width="10" stroke-linecap="round"/>
    <path d="M54 190h236" stroke="#cfd8e6" stroke-width="10" stroke-linecap="round"/>
    <g transform="translate(246 86)">
      <circle cx="54" cy="54" r="54" fill="#f7f8fb" stroke="#cfd8e6" stroke-width="4"/>
      <path d="M54 22l16 16-16 16-16-16z" fill="url(#accent)"/>
      <path d="M54 86l16 16-16 16-16-16z" fill="url(#accent)" opacity="0.9"/>
      <path d="M22 54l16-16 16 16-16 16z" fill="url(#accent)" opacity="0.8"/>
    </g>
  </g>
</svg>

